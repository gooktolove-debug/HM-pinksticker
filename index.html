    function blankForm() {
      return {
        stickerNo: '',
        vesselName: '',
        reason: '',
        stickeredBy: '',
        initialNote: '',
        stickerPhotos: [],
        vesselPhotos: [],
        location: null,
      };
    }

    function toDateText(value) {
      if (!value) return '-';
      const d = new Date(value);
      return d.toLocaleString('en-NZ', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }


      function decimalToDegreeMinute(value, axis) {
        if (value == null || Number.isNaN(Number(value))) return '-';
        const numeric = Number(value);
        const direction = axis === 'lat'
          ? (numeric >= 0 ? 'N' : 'S')
          : (numeric >= 0 ? 'E' : 'W');
        const absolute = Math.abs(numeric);
        const degrees = Math.floor(absolute);
        const minutes = (absolute - degrees) * 60;
        return `${degrees}° ${minutes.toFixed(4)}' ${direction}`;
      }

      function parseDecimalCoordinate(value, axis) {
        const input = String(value ?? '').trim().toUpperCase();
        if (!input) return null;
        const directionMatch = input.match(/[NSEW]$/);
        const direction = directionMatch ? directionMatch[0] : '';
        const numeric = Number(input.replace(/[NSEW]/g, '').trim());
        if (!Number.isFinite(numeric)) return null;
        let result = numeric;
        if (direction === 'S' || direction === 'W') result = -Math.abs(result);
        if (direction === 'N' || direction === 'E') result = Math.abs(result);
        const limit = axis === 'lat' ? 90 : 180;
        return Math.abs(result) <= limit ? result : null;
      }

      function parseDegreeMinuteCoordinate(degreesValue, minutesValue, directionValue, axis) {
        const degrees = Number(String(degreesValue ?? '').trim());
        const minutes = Number(String(minutesValue ?? '').trim());
        const direction = String(directionValue ?? '').trim().toUpperCase();
        if (!Number.isFinite(degrees) || !Number.isFinite(minutes) || !direction) return null;
        if (minutes < 0 || minutes >= 60) return null;
        const limit = axis === 'lat' ? 90 : 180;
        if (Math.abs(degrees) > limit) return null;
        let result = Math.abs(degrees) + (minutes / 60);
        if (direction === 'S' || direction === 'W') result = -result;
        return Math.abs(result) <= limit ? result : null;
      }

      function buildLocationEditorState(location) {
        const lat = location?.latitude ?? '';
        const lng = location?.longitude ?? '';
        const latAbs = lat === '' ? '' : Math.abs(Number(lat));
        const lngAbs = lng === '' ? '' : Math.abs(Number(lng));
        const latDeg = lat === '' ? '' : Math.floor(latAbs);
        const lngDeg = lng === '' ? '' : Math.floor(lngAbs);
        return {
          mode: 'dm',
          latDecimal: lat === '' ? '' : Number(lat).toFixed(6),
          lngDecimal: lng === '' ? '' : Number(lng).toFixed(6),
          latDeg: lat === '' ? '' : String(latDeg),
          latMin: lat === '' ? '' : ((latAbs - latDeg) * 60).toFixed(4),
          latDir: lat === '' ? 'S' : (Number(lat) >= 0 ? 'N' : 'S'),
          lngDeg: lng === '' ? '' : String(lngDeg),
          lngMin: lng === '' ? '' : ((lngAbs - lngDeg) * 60).toFixed(4),
          lngDir: lng === '' ? 'E' : (Number(lng) >= 0 ? 'E' : 'W'),
        };
      }

    function validatePinkStickerForm(form) {
      if (!form.stickerNo?.trim()) return 'Sticker No. is required.';
      if (!form.vesselName?.trim()) return 'Vessel name is required.';
      if (!form.reason?.trim()) return 'Reason is required.';
      if (!form.stickeredBy?.trim()) return 'Stickered by is required.';
      if (!form.stickerPhotos || form.stickerPhotos.length < 1) return 'At least 1 sticker photo is required.';
      if (!form.vesselPhotos || form.vesselPhotos.length < 1) return 'At least 1 vessel photo is required.';
      return null;
    }

    async function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('Geolocation is not supported in this browser.'));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          }),
          (err) => reject(err),
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          }
        );
      });
    }

    function normalizeFiles(fileList) {
      return Array.from(fileList || []).map((file) => ({
        file,
        previewUrl: URL.createObjectURL(file),
      }));
    }

    function buildPhotoPath(stickerNo, photoType, index, originalName) {
      const safeStickerNo = String(stickerNo || 'unknown').trim().replace(/[^a-zA-Z0-9-_]/g, '_');
      const ext = (originalName?.split('.').pop() || 'jpg').toLowerCase();
      return `${safeStickerNo}/${photoType}-${index}-${Date.now()}.${ext}`;
    }

    async function createPinkStickerRow(form) {
      const { data, error } = await sb
        .from('pink_stickers')
        .insert({
          sticker_no: form.stickerNo.trim(),
          vessel_name: form.vesselName.trim(),
          reason: form.reason.trim(),
          stickered_by: form.stickeredBy.trim(),
          latitude: form.location?.latitude ?? null,
          longitude: form.location?.longitude ?? null,
          location_accuracy_m: form.location?.accuracy ?? null,
        })
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    async function uploadPinkStickerPhoto(fileWrapper, stickerNo, photoType, index) {
      const path = buildPhotoPath(stickerNo, photoType, index, fileWrapper.file.name);
      const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, fileWrapper.file, {
        cacheControl: '3600',
        upsert: false,
        contentType: fileWrapper.file.type || 'image/jpeg',
      });
      if (error) throw error;
      const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      return {
        storage_path: path,
        public_url: data.publicUrl,
        photo_type: photoType,
      };
    }

    async function insertPinkStickerPhotoRows(stickerId, photos) {
      if (!photos.length) return;
      const rows = photos.map((p) => ({
        pink_sticker_id: stickerId,
        photo_type: p.photo_type,
        storage_path: p.storage_path,
        public_url: p.public_url,
      }));
      const { error } = await sb.from('pink_sticker_photos').insert(rows);
      if (error) throw error;
    }

    async function insertInitialNote(stickerId, noteText, createdBy) {
      if (!noteText?.trim()) return;
      const { error } = await sb.from('pink_sticker_notes').insert({
        pink_sticker_id: stickerId,
        note_text: noteText.trim(),
        created_by: createdBy.trim(),
      });
      if (error) throw error;
    }

    async function fetchStickerByNumber(stickerNo) {
      const cleaned = stickerNo.trim();
      if (!cleaned) return null;
      const { data, error } = await sb
        .from('pink_stickers')
        .select('*')
        .eq('sticker_no', cleaned)
        .maybeSingle();
      if (error) throw error;
      return data;
    }

    async function fetchStickersByVesselName(vesselName) {
      const cleaned = vesselName.trim();
      if (!cleaned) return [];
      const { data, error } = await sb
        .from('pink_stickers')
        .select('*')
        .ilike('vessel_name', `%${cleaned}%`)
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    }

    async function fetchStickerDetails(stickerId) {
      const [{ data: photos, error: photoError }, { data: notes, error: noteError }] = await Promise.all([
        sb.from('pink_sticker_photos').select('*').eq('pink_sticker_id', stickerId).order('created_at', { ascending: true }),
        sb.from('pink_sticker_notes').select('*').eq('pink_sticker_id', stickerId).order('created_at', { ascending: false }),
      ]);
      if (photoError) throw photoError;
      if (noteError) throw noteError;
      return { photos: photos || [], notes: notes || [] };
    }

    async function addNote(stickerId, noteText, createdBy) {
      const { error } = await sb.from('pink_sticker_notes').insert({
        pink_sticker_id: stickerId,
        note_text: noteText.trim(),
        created_by: createdBy.trim(),
      });
      if (error) throw error;
    }

    async function markResolved(stickerId, resolvedBy) {
      const { error } = await sb
        .from('pink_stickers')
        .update({
          status: 'resolved',
          resolved_at: new Date().toISOString(),
          resolved_by: resolvedBy.trim(),
        })
        .eq('id', stickerId);
      if (error) throw error;
    }

    function App() {
      const [screen, setScreen] = useState('home');
      const [form, setForm] = useState(blankForm);
      const [isSaving, setIsSaving] = useState(false);
      const [isFetchingLocation, setIsFetchingLocation] = useState(false);
      const [isEditingLocation, setIsEditingLocation] = useState(false);
      const [locationEditor, setLocationEditor] = useState(buildLocationEditorState(null));
      const [isSearching, setIsSearching] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [successMessage, setSuccessMessage] = useState('');
      const [searchType, setSearchType] = useState('sticker');
      const [searchStickerNo, setSearchStickerNo] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [selectedSticker, setSelectedSticker] = useState(null);
      const [selectedPhotos, setSelectedPhotos] = useState([]);
      const [selectedNotes, setSelectedNotes] = useState([]);
      const [noteInput, setNoteInput] = useState('');
      const [noteAuthor, setNoteAuthor] = useState('');
      const [resolvedBy, setResolvedBy] = useState('');
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const mapMarkerRef = useRef(null);

      useEffect(() => {
        if (screen === 'new' && !form.location && !isFetchingLocation) {
          handleFetchLocation();
        }
      }, [screen]);

      useEffect(() => {
        return () => {
          // cleanup object URLs
          [...form.stickerPhotos, ...form.vesselPhotos].forEach((item) => {
            if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
          });
        };
      }, []);

      useEffect(() => {
        if (screen !== 'detail' || !selectedSticker || selectedSticker.latitude == null || selectedSticker.longitude == null) {
          return;
        }

        if (!mapRef.current) return;

        if (!mapInstanceRef.current) {
          const map = L.map(mapRef.current, { zoomControl: false }).setView([selectedSticker.latitude, selectedSticker.longitude], 15);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OSM © CARTO',
          }).addTo(map);
          mapInstanceRef.current = map;
        }

        const map = mapInstanceRef.current;
        const latlng = [selectedSticker.latitude, selectedSticker.longitude];
        map.setView(latlng, 15);

        if (!mapMarkerRef.current) {
          mapMarkerRef.current = L.marker(latlng).addTo(map);
        } else {
          mapMarkerRef.current.setLatLng(latlng);
        }

        setTimeout(() => {
          map.invalidateSize();
        }, 100);
      }, [screen, selectedSticker]);

      function resetMessages() {
        setErrorMessage('');
        setSuccessMessage('');
      }

      async function handleFetchLocation() {
        resetMessages();
        setIsFetchingLocation(true);
        try {
          const location = await getCurrentLocation();
          setForm((prev) => ({ ...prev, location }));
          setLocationEditor(buildLocationEditorState(location));
          setIsEditingLocation(false);
        } catch (err) {
          console.error(err);
          setErrorMessage('Unable to get current location. Please try again.');
        } finally {
          setIsFetchingLocation(false);
        }
      }

      function updateFormField(field, value) {
        setForm((prev) => ({ ...prev, [field]: value }));
      }


      function startLocationEdit() {
        resetMessages();
        setLocationEditor(buildLocationEditorState(form.location));
        setIsEditingLocation(true);
      }

      function cancelLocationEdit() {
        setLocationEditor(buildLocationEditorState(form.location));
        setIsEditingLocation(false);
      }

      function updateLocationEditorField(field, value) {
        setLocationEditor((prev) => ({ ...prev, [field]: value }));
      }

      function saveEditedLocation() {
        resetMessages();
        let latitude = null;
        let longitude = null;
        if (locationEditor.mode === 'decimal') {
          latitude = parseDecimalCoordinate(locationEditor.latDecimal, 'lat');
          longitude = parseDecimalCoordinate(locationEditor.lngDecimal, 'lng');
        } else {
          latitude = parseDegreeMinuteCoordinate(locationEditor.latDeg, locationEditor.latMin, locationEditor.latDir, 'lat');
          longitude = parseDegreeMinuteCoordinate(locationEditor.lngDeg, locationEditor.lngMin, locationEditor.lngDir, 'lng');
        }
        if (latitude == null || longitude == null) {
          setErrorMessage('Please enter a valid latitude and longitude.');
          return;
        }
        const location = { latitude, longitude, accuracy: form.location?.accuracy ?? 0 };
        setForm((prev) => ({ ...prev, location }));
        setLocationEditor(buildLocationEditorState(location));
        setIsEditingLocation(false);
      }

      function handleSelectStickerPhotos(e) {
        const nextFiles = normalizeFiles(e.target.files);
        setForm((prev) => ({ ...prev, stickerPhotos: nextFiles }));
      }

      function handleSelectVesselPhotos(e) {
        const nextFiles = normalizeFiles(e.target.files);
        setForm((prev) => ({ ...prev, vesselPhotos: nextFiles }));
      }

      async function handleSubmit() {
        resetMessages();
        const validationError = validatePinkStickerForm(form);
        if (validationError) {
          setErrorMessage(validationError);
          return;
        }

        if (!form.location) {
          setErrorMessage('Current location is required. Please retry location fetch.');
          return;
        }

        setIsSaving(true);
        try {
          

          const sticker = await createPinkStickerRow(form);
          const uploadedPhotos = [];

          for (let i = 0; i < form.stickerPhotos.length; i++) {
            const uploaded = await uploadPinkStickerPhoto(form.stickerPhotos[i], sticker.sticker_no, 'sticker', i + 1);
            uploadedPhotos.push(uploaded);
          }

          for (let i = 0; i < form.vesselPhotos.length; i++) {
            const uploaded = await uploadPinkStickerPhoto(form.vesselPhotos[i], sticker.sticker_no, 'vessel', i + 1);
            uploadedPhotos.push(uploaded);
          }

          await insertPinkStickerPhotoRows(sticker.id, uploadedPhotos);
          await insertInitialNote(sticker.id, form.initialNote, form.stickeredBy);

          setSuccessMessage(`Pink sticker ${sticker.sticker_no} saved successfully.`);
          setForm(blankForm());
          setScreen('home');
        } catch (err) {
          console.error(err);
          const msg = err?.message || 'Failed to save pink sticker.';
          if (String(msg).toLowerCase().includes('duplicate')) {
            setErrorMessage('Sticker No. already exists. Please use a unique number.');
          } else {
            setErrorMessage(msg);
          }
        } finally {
          setIsSaving(false);
        }
      }

      async function openStickerDetail(sticker) {
        const details = await fetchStickerDetails(sticker.id);
        setSelectedSticker(sticker);
        setSelectedPhotos(details.photos);
        setSelectedNotes(details.notes);
        setResolvedBy('');
        setNoteInput('');
        setNoteAuthor('');
        setScreen('detail');
      }

      async function handleSearch() {
        resetMessages();
        if (!searchStickerNo.trim()) {
          setErrorMessage(
            searchType === 'sticker'
              ? 'Please enter a Pink Sticker No.'
              : 'Please enter a Vessel Name.'
          );
          return;
        }

        setIsSearching(true);
        try {
          setSearchResults([]);

          if (searchType === 'sticker') {
            const sticker = await fetchStickerByNumber(searchStickerNo);
            if (!sticker) {
              setSelectedSticker(null);
              setSelectedPhotos([]);
              setSelectedNotes([]);
              setErrorMessage('No sticker found for that number.');
              return;
            }
            await openStickerDetail(sticker);
            return;
          }

          const results = await fetchStickersByVesselName(searchStickerNo);
          if (!results.length) {
            setSelectedSticker(null);
            setSelectedPhotos([]);
            setSelectedNotes([]);
            setErrorMessage('No stickers found for that vessel name.');
            return;
          }
          setSearchResults(results);
        } catch (err) {
          console.error(err);
          setErrorMessage(err?.message || 'Failed to search sticker.');
        } finally {
          setIsSearching(false);
        }
      }

      async function handleRefreshDetails(stickerId, stickerNo) {
        const sticker = await fetchStickerByNumber(stickerNo);
        const details = await fetchStickerDetails(stickerId);
        setSelectedSticker(sticker);
        setSelectedPhotos(details.photos);
        setSelectedNotes(details.notes);
      }

      async function handleAddNote() {
        resetMessages();
        if (!selectedSticker) return;
        if (!noteInput.trim()) {
          setErrorMessage('Please enter a note.');
          return;
        }
        if (!noteAuthor.trim()) {
          setErrorMessage('Please enter the note author name.');
          return;
        }

        try {
          
          await addNote(selectedSticker.id, noteInput, noteAuthor);
          setNoteInput('');
          await handleRefreshDetails(selectedSticker.id, selectedSticker.sticker_no);
          setSuccessMessage('Note added successfully.');
        } catch (err) {
          console.error(err);
          setErrorMessage(err?.message || 'Failed to add note.');
        }
      }

      async function handleResolve() {
        resetMessages();
        if (!selectedSticker) return;
        if (!resolvedBy.trim()) {
          setErrorMessage('Please enter who resolved this sticker.');
          return;
        }

        try {
          
          await markResolved(selectedSticker.id, resolvedBy);
          await handleRefreshDetails(selectedSticker.id, selectedSticker.sticker_no);
          setSuccessMessage('Sticker marked as resolved.');
        } catch (err) {
          console.error(err);
          setErrorMessage(err?.message || 'Failed to mark as resolved.');
        }
      }

      return (
        <div className="min-h-screen bg-gray-50">
          {renderHeader()}
          <main className="max-w-3xl mx-auto px-4 py-5 pb-24">
            {content}
          </main>
          {renderMessageBar()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
